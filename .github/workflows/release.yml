name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps + build
        run: npm ci && npm run build

      - name: Build pkg binary
        run: |
          npm install -g @yao-pkg/pkg
          npm run pkg:linux

      - name: Bundle qdrant + ollama
        run: bash installer/scripts/bundle-binaries.sh linux

      - name: Build AppImage
        run: |
          chmod +x installer/scripts/build-appimage.sh
          APPIMAGE_EXTRACT_AND_RUN=1 VERSION=${GITHUB_REF_NAME#v} bash installer/scripts/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: installer/dist/Hippocampus-*.AppImage
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps + build
        run: npm ci && npm run build

      - name: Build pkg binary
        run: |
          npm install -g @yao-pkg/pkg
          npm run pkg:win

      - name: Bundle qdrant + ollama
        shell: bash
        run: bash installer/scripts/bundle-binaries.sh windows

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows installer
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v} bash installer/scripts/build-nsis.sh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/dist/Hippocampus-Setup-*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-installers/Hippocampus-*.AppImage
            artifacts/windows-installer/Hippocampus-Setup-*.exe
          body: |
            ## Hippocampus ${{ github.ref_name }}

            Local AI memory system — private, offline, open source.

            ### Installation

            **Linux**
            ```bash
            chmod +x Hippocampus-${{ github.ref_name }}.AppImage
            ./Hippocampus-${{ github.ref_name }}.AppImage
            ```

            **Windows**

            Run `Hippocampus-Setup-${{ github.ref_name }}.exe` — no admin required.

            ### Usage

            ```bash
            # Start the server (Qdrant + Ollama + HTTP API start automatically)
            ./Hippocampus-*.AppImage

            # CLI
            ./Hippocampus-*.AppImage ingest /path/to/file.pdf
            ./Hippocampus-*.AppImage query "what did I read about X?"
            ```

            HTTP API available at `http://localhost:3001` after startup.
