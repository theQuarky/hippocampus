name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-docker-scripts:
    name: Build Docker installer scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package shell scripts
        run: |
          cd installer/scripts
          zip ../../hippocampus-docker-installer.zip install.sh install.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: docker-scripts
          path: hippocampus-docker-installer.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Build main app
        run: |
          npm ci
          npm run build

      - name: Download bundled binaries
        run: bash installer/scripts/bundle-binaries.sh linux

      - name: Install installer deps
        working-directory: installer
        run: npm ci

      - name: Build Linux installers
        working-directory: installer
        run: npm run dist:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            installer/dist/**/*.AppImage
            installer/dist/**/*.deb
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Build main app
        run: |
          npm ci
          npm run build

      - name: Download bundled binaries
        shell: bash
        run: bash installer/scripts/bundle-binaries.sh windows

      - name: Install installer deps
        working-directory: installer
        run: npm ci

      - name: Build Windows installer
        working-directory: installer
        run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/dist/**/*.exe
          if-no-files-found: error

  build-mac:
    name: Build macOS installer
    runs-on: macos-latest
    if: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.MAC_CERT_P12 != '' && secrets.MAC_CERT_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Build main app
        run: |
          npm ci
          npm run build

      - name: Download bundled binaries
        run: bash installer/scripts/bundle-binaries.sh macos

      - name: Install installer deps
        working-directory: installer
        run: npm ci

      - name: Build + notarize macOS installer
        working-directory: installer
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: installer/dist/**/*.dmg
          if-no-files-found: error
          
  release:
    name: Create GitHub Release
    needs:
      - build-docker-scripts
      - build-linux
      - build-windows
      - build-mac
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/docker-scripts/*.zip
            artifacts/linux-installers/**/*.AppImage
            artifacts/linux-installers/**/*.deb
            artifacts/windows-installer/**/*.exe
            artifacts/mac-installer/**/*.dmg
          body: |
            ## Hippocampus ${{ github.ref_name }}

            Local AI memory system — private, offline, open source.

            ### Quick install (Docker)

            **Linux / macOS**
            ```bash
            curl -fsSL https://github.com/theQuarky/hippocampus/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell, run as Administrator)**
            ```powershell
            irm https://github.com/theQuarky/hippocampus/releases/latest/download/install.ps1 | iex
            ```

            ### Native installers

            Download the installer for your platform from the assets below.

            ### Notes

            - macOS notarization requires Apple credentials in GitHub Actions secrets.
            - Linux release assets include AppImage and deb.