name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          npm_config_fetch_timeout: '600000'
          npm_config_fetch_retry_mintimeout: '60000'
          npm_config_fetch_retry_maxtimeout: '300000'
          npm_config_fetch_retries: '5'
        run: npm ci

      - name: Build & package
        run: npm run release:linux

      - name: Bundle release directory into tarball
        run: |
          VERSION=${{ github.ref_name }}
          tar -czf hippocampus-${VERSION}-linux-x64.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: hippocampus-*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-release/*.tar.gz
          body: |
            ## Hippocampus ${{ github.ref_name }}

            Local AI memory system — private, offline, open source.

            ### Installation

            **Linux**
            ```bash
            tar -xzf hippocampus-${{ github.ref_name }}-linux-x64.tar.gz
            ./hippocampus-server-linux
            ```

            ### Requirements

            - [Qdrant](https://qdrant.tech) running on `localhost:6333`
            - [Ollama](https://ollama.ai) running on `localhost:11434`

            Or use Docker: `docker compose up -d`
