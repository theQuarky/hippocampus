services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hippocampus-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: hippocampus-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 15s
      timeout: 5s
      retries: 5

  hippocampus:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: hippocampus-app
    restart: unless-stopped
    ports:
      - "50051:50051"
      - "3001:3001"
    volumes:
      - ./data/hippocampus:/app/data
      - ./data/models:/app/models
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - GRPC_PORT=50051
      - HTTP_PORT=3001
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_CONCURRENCY=8
      - CHUNK_STRATEGY=fast
      - DB_PATH=/app/data/hippocampus.db
      - TRANSFORMERS_CACHE=/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

  ollama-pull:
    image: ollama/ollama:latest
    container_name: hippocampus-ollama-pull
    volumes:
      - ./data/ollama:/root/.ollama
    entrypoint: >
      sh -c "
        ollama pull phi3:mini &&
        echo 'Models ready'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    profiles:
      - setup
